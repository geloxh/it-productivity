version: '3.8'

services:
  server:
    build:
      context: ./server
      dockerfile: DockerFile
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
    volumes:
      - ./server:/app
      - /app/node_modules
    depeends_on:
      - db
    networks:
      - app-network

  client:
    build:
      context: ./client
      dockerfile: DockerFile
    ports:
      - "3000:3000"
    volumes: 
      - ./client:/app
    depends_on:
      - server
    networks:
      - app-network

  db:
    image: mongo:latesr
    environment:
      - MONGO_INITDB_DATABASE=it-productivity
    ports:
      - "27017:27017"
    volumes:
      - "mongo-data:/data/db"
    networks:
      - app-network
volumes:
  mongo-data:

networks:
  app-network:
    driver: bridge